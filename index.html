<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tank Battle Game</title>
  <style>
  html,body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000; /* 검은 배경 */
  }
  #instruction {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 14px;
    /* background: rgba(0, 0, 0, 0.2); */
    padding: 5px 10px;
    border-radius: 5px;
    pointer-events: none; /* 클릭이 div를 통과하여 canvas로 전달 */
    display: none; /* 초기에는 숨김 */
  }
  #special-weapon {
    color: #00ffffff;
    font-weight: bold;
  }
  #point {
    color: #00ffffff;
    font-weight: bold;
    font-size: 1.2rem;
  }
  #specialWeaponPoint {
    font-weight: bold;
    font-size: 1.2rem;
  }
  #point, #special-weapon, #specialWeaponPoint {
    text-shadow: 
    0 0 4px  currentColor, 
    0 0 8px currentColor,
    0 0 16px currentColor,
    0 0 32px currentColor;
  }

  #gameCanvas {
    touch-action: none;
  }
  #game-overlay,
  #loading-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
  }

  #game-overlay.hidden,
  #loading-screen.hidden {
    display: none;
  }

  #game-overlay {
    background: rgba(0, 0, 0, 0.45);
  }

  #overlay-content,
  #loading-panel {
    pointer-events: auto;
    background: rgba(10, 10, 10, 0.95);
    border: 1px solid #6cf;
    border-radius: 16px;
    padding: 28px 32px;
    min-width: 320px;
    max-width: 520px;
    text-align: center;
    color: #fff;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
  }

  #overlay-message {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  #overlay-submessage {
    margin-top: 14px;
    font-size: 1rem;
    color: #d4d4d4;
  }

  #loading-title {
    font-size: 2.4rem;
    font-weight: 700;
    margin-bottom: 24px;
  }

  #loading-bar {
    width: 100%;
    height: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  #loading-bar-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #25d7ff, #4f99ff);
    transition: width 0.15s ease;
  }

  #loading-status {
    margin-bottom: 18px;
    font-size: 1rem;
    color: #a6c8ff;
  }

  #loading-hint {
    color: #b1f7ff;
    opacity: 0.95;
    font-size: 1rem;
    line-height: 1.6;
  }

  #loading-hint.hidden {
    display: none;
  }

  #base-health-ui {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 16px;
    z-index: 15;
    pointer-events: none;
  }

  .base-health {
    min-width: 240px;
    width: 400px;
    display: grid;
    grid-template-columns: 1fr auto;
    color:#fff;
    gap: 10px;
    align-items: center;
    padding: 10px 14px;
    border-radius: 16px;
    background: transparent;
  }

  .base-health .label {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .bar-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.3);
    overflow: hidden;
    grid-column: 1 / -1;
  }

  .bar-fill {
    width: 100%;
    height: 100%;
    transition: width 0.15s ease;
  }

  .base-blue .bar-fill {
    background: #5cb3ff;
  }

  .base-red .bar-fill {
    background: #ff6a6a;
  }

  #super-mode-border {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    box-shadow: inset 0 0 30px #00ffffff;
    pointer-events: none;
    z-index: 5;
    display: none;
  }

  .killcount {
    font-size: 1.3rem;
    color: #d4d4d4;
    text-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    margin-top: -6px;
  }
  </style>
</head>
<body>
  <!-- Canvas for the game -->
  <canvas id="gameCanvas"></canvas>
  <div id="super-mode-border"></div>
  <div id="game-overlay" class="overlay hidden">
    <div id="overlay-content">
      <div id="overlay-message"></div>
      <div id="overlay-submessage"></div>
    </div>
  </div>
  <div id="loading-screen">
    <div id="loading-panel">
      <div id="loading-title">Loading Assets...</div>
      <div id="loading-bar"><div id="loading-bar-fill"></div></div>
      <div id="loading-status">0%</div>
      <div id="loading-hint" class="hidden"><strong>SPACE to Start</strong><br><small>ENTER to play as Super Mode</small></div>
    </div>
  </div>
  <div id="base-health-ui">
    <div class="base-health base-blue">
      <div class="label"><div id="blue-base-value" class="value">10000</div></div>
      <div class="bar-track"><div id="blue-base-fill" class="bar-fill"></div></div>
      <p class="killcount">Blue Score: <br><span id="blueTeamKill" style="color: #5cb3ff;">0</span></p>
      <span id="special-weapon">[██████████] </span>
    </div>
    <div class="base-health base-red">
      <div class="label"><div id="red-base-value" class="value">10000</div></div>
      <div class="bar-track"><div id="red-base-fill" class="bar-fill"></div></div>
      <p class="killcount">Red Score: <br><span id="redTeamKill" style="color: #ff6a6a;">0</span></p>
      <div>Point:<span id="point">10</span>&nbsp;&nbsp;&nbsp;&nbsp;</span>Orbital Cost <span id="specialWeaponPoint"> 5</span></div>
    </div>
  </div>
  <div id="instruction">
      <p>WASD: Move</p>
      <p>Mouse: Aim</p>
      <p>Left Click: Shoot</p>
      <p>Right Click: Special Weapon (Oribtal Strike)</p>
      <p>Space + Scroll: FreeCamera</p>
      <p>My kill score: <span id="myKill" style="color: #fff;">0</span></p>
  <div id="fps" style="position:fixed;top:5px;left:5px;color:white"></div>
  <audio id="bgm" src="./assets/BGM.mp3" preload="auto" loop></audio>
  <audio class="hit" src="./assets/Impact_1.wav" preload="auto"></audio>
  <audio class="hit" src="./assets/Impact_2.wav" preload="auto"></audio>
  <audio class="hit" src="./assets/Impact_3.wav" preload="auto"></audio>
  <audio class="hit" src="./assets/Impact_4.wav" preload="auto"></audio>
  <!-- Load the main module (ES module entry point) -->
  <!-- <script type="module" src="./main.js"></script> -->
  <script type="module" src="./game.bundle.js"></script>
  <!-- FPS 측정 -->
  <script>
    let frameCount = 0;
    let lastTime = performance.now();
    const fpsDisplay = document.getElementById("fps");

    function loop() {
      frameCount++;
      const now = performance.now();
      const delta = now - lastTime;

      if (delta >= 1000) {
        fpsDisplay.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastTime = now;
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
